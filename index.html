<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Here Wallpaper — 主题预览 / Theme Preview</title>
  <style>
    :root {
      --page-bg: #111318;
      --page-text: #e8eaed;
      --page-muted: #9aa0a6;
      --card-bg: #1a1d24;
      --border: #2a2f3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
      background: var(--page-bg);
      color: var(--page-text);
      line-height: 1.5;
      padding: 32px 24px 64px;
    }

    header {
      max-width: 1200px;
      margin: 0 auto 40px;
    }

    .page-title-zh {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
    }

    .page-title-en {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 600;
      color: var(--page-muted);
      line-height: 1.2;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--page-muted);
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: baseline;
    }

    .section-title-zh,
    .section-title-en {
      text-transform: none;
      letter-spacing: 0;
    }

    .section-title-zh {
      font-size: 15px;
      color: var(--page-text);
    }

    .section-title-en {
      font-size: 13px;
      color: var(--page-muted);
    }

    .section-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--page-muted);
      text-transform: none;
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .theme-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .theme-meta {
      padding: 16px 16px 12px;
    }

    .theme-meta h3 {
      font-size: 17px;
      font-weight: 600;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .theme-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .theme-title-zh {
      line-height: 1.25;
    }

    .theme-title-en {
      font-size: 13px;
      font-weight: 500;
      color: var(--page-muted);
      line-height: 1.25;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 999px;
      background: #2a3140;
      color: #aeb6c2;
    }

    .badge.pro { background: #2b2240; color: #c4a8e8; }

    .theme-meta p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--page-muted);
      line-height: 1.45;
    }

    .theme-desc-en {
      margin-top: 4px;
      font-size: 12px;
      color: #7d848c;
    }

    section {
      max-width: 1200px;
      margin: 0 auto 48px;
    }

    .phone-wrap {
      padding: 0 16px 16px;
    }

    .phone {
      width: 100%;
      aspect-ratio: 393 / 852;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .wallpaper {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .layer-land { position: absolute; inset: 0; }

    .layer-water {
      position: absolute;
      right: 8%;
      top: 22%;
      width: 34%;
      height: 22%;
      border-radius: 18% 42% 38% 28%;
      opacity: 0.95;
    }

    .layer-park {
      position: absolute;
      left: 6%;
      top: 38%;
      width: 28%;
      height: 14%;
      border-radius: 12px;
      opacity: 0.9;
    }

    .layer-building {
      position: absolute;
      left: 42%;
      top: 30%;
      width: 18%;
      height: 20%;
      border-radius: 4px;
      opacity: 0.85;
    }

    .roads {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .fade-bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 25%;
      pointer-events: none;
    }

    .poster-text {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 7%;
      text-align: center;
      z-index: 2;
      pointer-events: none;
    }

    .poster-text .city {
      font-size: clamp(18px, 5.5vw, 26px);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .poster-text .region {
      margin-top: 4px;
      font-size: clamp(10px, 2.8vw, 13px);
      font-weight: 500;
      letter-spacing: 0.12em;
      opacity: 0.85;
    }

    .swatches {
      display: flex;
      gap: 6px;
      padding: 0 16px 16px;
      flex-wrap: wrap;
    }

    .swatch {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 52px;
    }

    .swatch-color {
      height: 22px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .swatch-label {
      font-size: 10px;
      color: var(--page-muted);
    }

    .swatch-hex {
      font-size: 9px;
      color: #6b7280;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body>
  <header>
    <div class="page-title-zh">Here Wallpaper 主题预览</div>
    <div class="page-title-en">Here Wallpaper Theme Preview</div>
  </header>

  <section id="basic-section">
    <h2>
      <span class="section-title-zh">基础</span>
      <span class="section-title-en">Basic</span>
      <span class="section-count">7</span>
    </h2>
    <div class="grid" id="basic-grid"></div>
  </section>

  <section id="pro-section">

        tier: "basic",

          roads: { major: "#486850", minor_mid: "#90A898", minor_low: "#A0B8A8", path: "#B8C8B4" }
        }

      {

        nameZh: "暖陶土", nameEn: "Warm Clay",

    const proThemes = [

        tier: "pro",
        ui: { bg: "#050A18", text: "#78F8C8" },
        map: {
          land: "#050A18", water: "#081428", parks: "#0C1C30", buildings: "#5848A0",

      {

        ui: { bg: "#1A1008", text: "#FFB060" },

        nameZh: "薰衣草黄昏", nameEn: "Lavender Dusk",

      },
      {
        id: "polar_ice",
        nameZh: "极地冰", nameEn: "Polar Ice",
        descZh: "极地白，冰川蓝水体与冷钢色道路。",
        descEn: "Crisp arctic white with glacier-blue water and frozen steel roads.",
        tier: "pro",
        ui: { bg: "#F2F8FC", text: "#1860A0" },
        map: {
          land: "#F2F8FC", water: "#78B8E0", parks: "#E4F0F8", buildings: "#4890B8",
          roads: { major: "#2070A8", minor_mid: "#88B8D8", minor_low: "#98C8E0", path: "#B8D8EC" }

      },
      {

        nameZh: "Synthwave '84", nameEn: "Synthwave '84",
        descZh: "复古日落紫，霓虹粉网格道路与电青光晕。",
        descEn: "Retro sunset purple with hot-pink grid roads and electric cyan glow.",
        tier: "pro",
        ui: { bg: "#262335", text: "#03EDF9" },
        map: {
          land: "#262335", water: "#1E1830", parks: "#302848", buildings: "#8050A8",

        }
      },
      {

        descEn: "Industrial blue-black night with neon magenta roads and acid-yellow signs.",

          roads: { major: "#FF007A", minor_mid: "#202838", minor_low: "#141C28", path: "#1A2030" }
        }
      },
      {
        id: "gilded_imperial",
        nameZh: "鎏金", nameEn: "Gilded Imperial",
        descZh: "宫墙朱红底色，鎏金道路，盛唐宫殿气派。",
        descEn: "Palace cinnabar walls with gilt-gold roads — Tang hall grandeur.",
        tier: "pro",
        ui: { bg: "#6E1418", text: "#E8C868" },
        map: {
          land: "#6E1418", water: "#4A0C10", parks: "#581418", buildings: "#B8860B",
          roads: { major: "#D4AF37", minor_mid: "#481018", minor_low: "#3A0C10", path: "#501418" }

      },

        map: {
          land: "#1A1B26", water: "#16161E", parks: "#1F2335", buildings: "#565F89",
          roads: { major: "#7AA2F7", minor_mid: "#24283B", minor_low: "#1A1B26", path: "#292E42" }
        }
      }

    function roadSVG(colors) {
      const { major, minor_mid, minor_low, path } = colors;
      return `
        <svg class="roads" viewBox="0 0 393 852" preserveAspectRatio="none" aria-hidden="true">
          <path d="M-20 180 Q 120 200, 200 260 T 420 320" stroke="${path}" stroke-width="5" fill="none" opacity="0.7"/>
          <path d="M80 420 Q 180 400, 280 430 T 420 470" stroke="${minor_low}" stroke-width="7" fill="none"/>
          <path d="M-10 520 Q 140 500, 260 540 T 420 600" stroke="${minor_mid}" stroke-width="9" fill="none"/>
          <path d="M40 650 L 360 690" stroke="${minor_mid}" stroke-width="8" fill="none"/>
          <path d="M-30 740 Q 200 700, 420 760" stroke="${major}" stroke-width="12" fill="none"/>
          <path d="M180 -20 L 210 900" stroke="${major}" stroke-width="10" fill="none" opacity="0.85"/>
          <path d="M20 300 L 380 340" stroke="${major}" stroke-width="11" fill="none"/>
        </svg>`;
    }

    function renderTheme(theme) {
      const { ui, map } = theme;
      const fade = `linear-gradient(to top, ${ui.bg} 0%, transparent 100%)`;
      const badgeClass = theme.tier === "pro" ? "badge pro" : "badge";
      const badgeZh = theme.tier === "pro" ? "PRO" : "基础";
      const badgeEn = theme.tier === "pro" ? "PRO" : "Basic";

      const swatchItems = [
        ["背景 / BG", ui.bg],
        ["文字 / Text", ui.text],
        ["主路 / Major", map.roads.major],
        ["水体 / Water", map.water],
        ["公园 / Parks", map.parks]
      ].map(([label, color]) => `
        <div class="swatch">
          <div class="swatch-color" style="background:${color}"></div>
          <div class="swatch-label">${label}</div>
          <div class="swatch-hex">${color}</div>
        </div>`).join("");

      return `
        <article class="theme-card">
          <div class="theme-meta">
            <h3>
              <span class="theme-title-wrap">
                <span class="theme-title-zh">${theme.nameZh}</span>
                <span class="theme-title-en">${theme.nameEn}</span>
              </span>
              <span class="${badgeClass}" title="${badgeEn}">${badgeZh}</span>
            </h3>
            <p>${theme.descZh}</p>
            <p class="theme-desc-en">${theme.descEn}</p>
          </div>
          <div class="phone-wrap">
            <div class="phone">
              <div class="wallpaper">
                <div class="layer-land" style="background:${map.land}"></div>
                <div class="layer-water" style="background:${map.water}"></div>
                <div class="layer-park" style="background:${map.parks}"></div>
                <div class="layer-building" style="background:${map.buildings}"></div>
                ${roadSVG(map.roads)}
                <div class="fade-bottom" style="background:${fade}"></div>
                <div class="poster-text">
                  <div class="city" style="color:${ui.text}">XI'AN</div>
                  <div class="region" style="color:${ui.text}">CHINA</div>
                </div>
              </div>
            </div>
          </div>
          <div class="swatches">${swatchItems}</div>
        </article>`;
    }

    document.getElementById("basic-grid").innerHTML = basicThemes.map(renderTheme).join("");
    document.getElementById("pro-grid").innerHTML = proThemes.map(renderTheme).join("");
  </script>
</body>
</html>
